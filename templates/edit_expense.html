{% extends "base.html" %}
{% block title %}Edit Expense{% endblock %}
{% block page_title %}Edit Expense{% endblock %}

{% block content %}

<div class="page-header">
  <div>
    <h1>Edit Expense</h1>
    <p>Update transaction details</p>
  </div>
  <a href="{{ url_for('expenses') }}" class="btn btn-outline">
    <i class="fa-solid fa-arrow-left"></i> Back
  </a>
</div>

<div style="max-width:680px;">
  <div class="card">
    <form method="POST" action="{{ url_for('edit_expense', exp_id=exp.id) }}">

      <div class="form-row cols-2">
        <div class="form-group">
          <label class="form-label">Title *</label>
          <input type="text" name="title" class="form-control" value="{{ exp.title }}" required>
        </div>
        <div class="form-group">
          <label class="form-label">Amount (₹) *</label>
          <input type="number" name="amount" class="form-control" value="{{ exp.amount }}" min="0.01" step="0.01" required>
        </div>
      </div>

      <div class="form-row cols-2">
        <div class="form-group">
          <label class="form-label">Category *</label>
          <select name="category" class="form-control" required>
            {% for c in categories %}
            <option value="{{ c }}" {% if exp.category == c %}selected{% endif %}>{{ c }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Date *</label>
          <input type="date" name="date" class="form-control" value="{{ exp.date }}" required>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Notes</label>
        <textarea name="notes" class="form-control">{{ exp.notes }}</textarea>
      </div>

      <div class="form-group">
        <label style="display:flex;align-items:center;gap:10px;cursor:pointer;font-size:14px;">
          <input type="checkbox" name="is_recurring" {% if exp.is_recurring %}checked{% endif %} style="width:16px;height:16px;">
          <span><strong>Recurring expense</strong></span>
        </label>
      </div>

      <div style="display:flex;gap:12px;">
        <button type="submit" class="btn btn-primary" style="flex:1;justify-content:center;">
          <i class="fa-solid fa-check"></i> Save Changes
        </button>
        <a href="{{ url_for('expenses') }}" class="btn btn-outline" style="flex:1;justify-content:center;">Cancel</a>
      </div>

    </form>
  </div>
</div>

{% endblock %}
